# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "scobc"
BBFILE_PATTERN_scobc = "^${LAYERDIR}/"
BBFILE_PRIORITY_scobc = "6"

LAYERDEPENDS_scobc = "core"
LAYERSERIES_COMPAT_scobc = "scarthgap"

SCOBC_HDF_DIR = "${LAYERDIR}/recipes-bsp/hdf/files"
SCOBC_SDT_DIR = "${LAYERDIR}/recipes-bsp/sdt/files"
